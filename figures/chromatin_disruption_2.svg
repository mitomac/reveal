<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Panel 2: Fork passage disrupts chromatin -->

  <!-- Title -->
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="20" fill="#333" text-anchor="middle">Replication fork disrupts chromatin</text>

  <!-- Parental DNA (left side, before fork) -->
  <line x1="50" y1="180" x2="300" y2="180" stroke="#222" stroke-width="3"/>

  <!-- Fork junction - two daughter strands splitting -->
  <!-- Upper daughter strand -->
  <line x1="300" y1="180" x2="380" y2="120" stroke="#222" stroke-width="3"/>
  <line x1="380" y1="120" x2="750" y2="120" stroke="#222" stroke-width="3"/>

  <!-- Lower daughter strand -->
  <line x1="300" y1="180" x2="380" y2="240" stroke="#222" stroke-width="3"/>
  <line x1="380" y1="240" x2="750" y2="240" stroke="#222" stroke-width="3"/>

  <!-- Parental nucleosomes (left of fork) -->
  <g transform="translate(100, 180)">
    <circle cx="0" cy="0" r="24" fill="none" stroke="#7cb342" stroke-width="3"/>
    <circle cx="0" cy="0" r="17" fill="#64b5f6" stroke="#1976d2" stroke-width="2"/>
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="#1976d2" stroke-width="2"/>
    <line x1="8" y1="-8" x2="-8" y2="8" stroke="#1976d2" stroke-width="2"/>
  </g>

  <g transform="translate(180, 180)">
    <circle cx="0" cy="0" r="24" fill="none" stroke="#7cb342" stroke-width="3"/>
    <circle cx="0" cy="0" r="17" fill="#64b5f6" stroke="#1976d2" stroke-width="2"/>
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="#1976d2" stroke-width="2"/>
    <line x1="8" y1="-8" x2="-8" y2="8" stroke="#1976d2" stroke-width="2"/>
  </g>

  <!-- Displaced histones floating near fork -->
  <g transform="translate(340, 150)">
    <circle cx="0" cy="0" r="14" fill="#64b5f6" stroke="#1976d2" stroke-width="2" opacity="0.7"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#1976d2" stroke-width="2"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#1976d2" stroke-width="2"/>
  </g>

  <g transform="translate(360, 200)">
    <circle cx="0" cy="0" r="14" fill="#64b5f6" stroke="#1976d2" stroke-width="2" opacity="0.7"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#1976d2" stroke-width="2"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#1976d2" stroke-width="2"/>
  </g>

  <!-- Naked DNA regions on daughter strands (no nucleosomes yet) -->
  <!-- Question marks indicating uncertainty -->
  <text x="500" y="100" font-family="Arial, sans-serif" font-size="24" fill="#d32f2f" text-anchor="middle">?</text>
  <text x="600" y="100" font-family="Arial, sans-serif" font-size="24" fill="#d32f2f" text-anchor="middle">?</text>
  <text x="700" y="100" font-family="Arial, sans-serif" font-size="24" fill="#d32f2f" text-anchor="middle">?</text>

  <text x="500" y="270" font-family="Arial, sans-serif" font-size="24" fill="#d32f2f" text-anchor="middle">?</text>
  <text x="600" y="270" font-family="Arial, sans-serif" font-size="24" fill="#d32f2f" text-anchor="middle">?</text>
  <text x="700" y="270" font-family="Arial, sans-serif" font-size="24" fill="#d32f2f" text-anchor="middle">?</text>

  <!-- Fork direction arrow -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  <line x1="280" y1="320" x2="380" y2="320" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="330" y="345" font-family="Arial, sans-serif" font-size="14" fill="#666" text-anchor="middle">Fork movement</text>

  <!-- Label -->
  <text x="580" y="180" font-family="Arial, sans-serif" font-size="16" fill="#333" text-anchor="middle">Two daughter duplexes</text>
  <text x="580" y="200" font-family="Arial, sans-serif" font-size="16" fill="#333" text-anchor="middle">need nucleosomes</text>
</svg>