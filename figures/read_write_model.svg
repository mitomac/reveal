<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="450" viewBox="0 0 900 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Read-Write Model for Epigenetic Inheritance -->

  <defs>
    <marker id="arrowgray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <!-- DNA strand -->
  <line x1="100" y1="200" x2="800" y2="200" stroke="#222" stroke-width="3"/>

  <!-- Parental nucleosome (left) with H3K27me3 mark -->
  <g transform="translate(250, 200)">
    <!-- H2A-H2B dimer halves (top and bottom green arcs with gaps on sides) -->
    <path d="M -15 -18 A 22 22 0 0 1 15 -18" fill="none" stroke="#7cb342" stroke-width="5"/>
    <path d="M 15 18 A 22 22 0 0 1 -15 18" fill="none" stroke="#7cb342" stroke-width="5"/>
    <!-- H3/H4 tetramer - parental (darker blue with X pattern) -->
    <circle cx="0" cy="0" r="15" fill="#42a5f5" stroke="#1976d2" stroke-width="2"/>
    <!-- X pattern (diagonal) -->
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="#1565c0" stroke-width="2.5"/>
    <line x1="8" y1="-8" x2="-8" y2="8" stroke="#1565c0" stroke-width="2.5"/>
    <!-- H3K27me3 mark (red dot) -->
    <circle cx="22" cy="-14" r="8" fill="#d32f2f" stroke="#b71c1c" stroke-width="1"/>
    <text x="22" y="-10" font-family="Arial, sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">me3</text>
  </g>
  <text x="250" y="250" font-family="Arial, sans-serif" font-size="12" fill="#1976d2" text-anchor="middle" font-weight="bold">Parental</text>
  <text x="250" y="265" font-family="Arial, sans-serif" font-size="11" fill="#d32f2f" text-anchor="middle">H3K27me3</text>

  <!-- Nascent nucleosome (middle) - getting marked -->
  <g transform="translate(450, 200)">
    <!-- H2A-H2B dimer halves (top and bottom green arcs with gaps on sides) -->
    <path d="M -15 -18 A 22 22 0 0 1 15 -18" fill="none" stroke="#7cb342" stroke-width="5"/>
    <path d="M 15 18 A 22 22 0 0 1 -15 18" fill="none" stroke="#7cb342" stroke-width="5"/>
    <!-- H3/H4 tetramer - nascent (lighter blue with X pattern) -->
    <circle cx="0" cy="0" r="15" fill="#90caf9" stroke="#64b5f6" stroke-width="2"/>
    <!-- X pattern (diagonal, lighter) -->
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="#42a5f5" stroke-width="2.5"/>
    <line x1="8" y1="-8" x2="-8" y2="8" stroke="#42a5f5" stroke-width="2.5"/>
    <!-- H3K27me3 mark being added (lighter red, dashed outline) -->
    <circle cx="22" cy="-14" r="8" fill="#ef9a9a" stroke="#d32f2f" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="22" y="-10" font-family="Arial, sans-serif" font-size="7" fill="#b71c1c" text-anchor="middle" font-weight="bold">me3</text>
  </g>
  <text x="450" y="250" font-family="Arial, sans-serif" font-size="12" fill="#64b5f6" text-anchor="middle" font-weight="bold">Nascent</text>
  <text x="450" y="265" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">(being marked)</text>

  <!-- Nascent nucleosome (right) - unmarked -->
  <g transform="translate(650, 200)">
    <!-- H2A-H2B dimer halves (top and bottom green arcs with gaps on sides) -->
    <path d="M -15 -18 A 22 22 0 0 1 15 -18" fill="none" stroke="#7cb342" stroke-width="5"/>
    <path d="M 15 18 A 22 22 0 0 1 -15 18" fill="none" stroke="#7cb342" stroke-width="5"/>
    <!-- H3/H4 tetramer - nascent (lighter blue with X pattern) -->
    <circle cx="0" cy="0" r="15" fill="#90caf9" stroke="#64b5f6" stroke-width="2"/>
    <!-- X pattern (diagonal, lighter) -->
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="#42a5f5" stroke-width="2.5"/>
    <line x1="8" y1="-8" x2="-8" y2="8" stroke="#42a5f5" stroke-width="2.5"/>
  </g>
  <text x="650" y="250" font-family="Arial, sans-serif" font-size="12" fill="#64b5f6" text-anchor="middle" font-weight="bold">Nascent</text>

  <!-- PRC2 complex -->
  <g transform="translate(350, 90)">
    <!-- PRC2 body -->
    <ellipse cx="0" cy="0" rx="70" ry="35" fill="#9c27b0" fill-opacity="0.2" stroke="#7b1fa2" stroke-width="2"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="14" fill="#7b1fa2" text-anchor="middle" font-weight="bold">PRC2</text>

    <!-- EED reader domain reaching to parental mark -->
    <path d="M -50 20 Q -80 60, -92 95" stroke="#7b1fa2" stroke-width="3" fill="none"/>
    <circle cx="-92" cy="95" r="12" fill="#7b1fa2" stroke="#4a148c" stroke-width="2"/>
    <text x="-92" y="99" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">EED</text>

    <!-- EZH2 writer domain reaching to nascent -->
    <path d="M 50 20 Q 80 60, 92 95" stroke="#7b1fa2" stroke-width="3" fill="none"/>
    <circle cx="92" cy="95" r="12" fill="#e91e63" stroke="#c2185b" stroke-width="2"/>
    <text x="92" y="99" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">EZH2</text>
  </g>

  <!-- READ label -->
  <text x="220" y="70" font-family="Arial, sans-serif" font-size="14" fill="#7b1fa2" text-anchor="middle" font-weight="bold">READ</text>
  <line x1="220" y1="75" x2="258" y2="110" stroke="#7b1fa2" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrowgray)"/>

  <!-- WRITE label -->
  <text x="480" y="70" font-family="Arial, sans-serif" font-size="14" fill="#e91e63" text-anchor="middle" font-weight="bold">WRITE</text>
  <line x1="480" y1="75" x2="442" y2="110" stroke="#e91e63" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrowgray)"/>

  <!-- Legend -->
  <g transform="translate(120, 340)">
    <!-- Parental nucleosome icon -->
    <path d="M -9 -11 A 14 14 0 0 1 9 -11" fill="none" stroke="#7cb342" stroke-width="3"/>
    <path d="M 9 11 A 14 14 0 0 1 -9 11" fill="none" stroke="#7cb342" stroke-width="3"/>
    <circle cx="0" cy="0" r="9" fill="#42a5f5" stroke="#1976d2" stroke-width="1.5"/>
    <line x1="-5" y1="-5" x2="5" y2="5" stroke="#1565c0" stroke-width="2"/>
    <line x1="5" y1="-5" x2="-5" y2="5" stroke="#1565c0" stroke-width="2"/>
    <text x="25" y="5" font-family="Arial, sans-serif" font-size="12" fill="#333">Parental H3/H4</text>
  </g>

  <g transform="translate(280, 340)">
    <!-- Nascent nucleosome icon -->
    <path d="M -9 -11 A 14 14 0 0 1 9 -11" fill="none" stroke="#7cb342" stroke-width="3"/>
    <path d="M 9 11 A 14 14 0 0 1 -9 11" fill="none" stroke="#7cb342" stroke-width="3"/>
    <circle cx="0" cy="0" r="9" fill="#90caf9" stroke="#64b5f6" stroke-width="1.5"/>
    <line x1="-5" y1="-5" x2="5" y2="5" stroke="#42a5f5" stroke-width="2"/>
    <line x1="5" y1="-5" x2="-5" y2="5" stroke="#42a5f5" stroke-width="2"/>
    <text x="25" y="5" font-family="Arial, sans-serif" font-size="12" fill="#333">Nascent H3/H4</text>
  </g>

  <g transform="translate(460, 340)">
    <circle cx="0" cy="0" r="8" fill="#d32f2f" stroke="#b71c1c" stroke-width="1"/>
    <text x="18" y="5" font-family="Arial, sans-serif" font-size="12" fill="#333">H3K27me3</text>
  </g>

  <g transform="translate(620, 340)">
    <ellipse cx="0" cy="0" rx="20" ry="10" fill="#9c27b0" fill-opacity="0.3" stroke="#7b1fa2" stroke-width="2"/>
    <text x="30" y="5" font-family="Arial, sans-serif" font-size="12" fill="#333">PRC2 (EED + EZH2)</text>
  </g>

  <!-- Title/explanation at bottom -->
  <text x="450" y="390" font-family="Arial, sans-serif" font-size="14" fill="#333" text-anchor="middle" font-weight="bold">Read-Write Model: Symmetric inheritance enables epigenetic memory</text>
  <text x="450" y="410" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">EED reads parental H3K27me3 → recruits EZH2 → writes mark on nascent neighbors</text>

</svg>