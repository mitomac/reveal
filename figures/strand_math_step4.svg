<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="400" viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Step 4: Leading and lagging labeled - using continuous arcs with clipping -->

  <defs>
    <!-- Clip paths for left and right halves -->
    <clipPath id="leftHalf4">
      <rect x="0" y="0" width="450" height="400"/>
    </clipPath>
    <clipPath id="rightHalf4">
      <rect x="450" y="0" width="450" height="400"/>
    </clipPath>

    <marker id="arrowred3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d32f2f"/>
    </marker>

    <!-- Blue arrowhead for leading strand -->
    <marker id="arrowblue4" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>

  <!-- Watson strand labels -->
  <text x="60" y="140" font-family="Arial, sans-serif" font-size="16" fill="#333">5'</text>
  <text x="820" y="140" font-family="Arial, sans-serif" font-size="16" fill="#333">3'</text>
  <text x="450" y="35" font-family="Arial, sans-serif" font-size="18" fill="#333" text-anchor="middle" font-weight="bold">Watson</text>

  <!-- Crick strand labels -->
  <text x="60" y="175" font-family="Arial, sans-serif" font-size="16" fill="#333">3'</text>
  <text x="820" y="175" font-family="Arial, sans-serif" font-size="16" fill="#333">5'</text>
  <text x="450" y="285" font-family="Arial, sans-serif" font-size="18" fill="#333" text-anchor="middle" font-weight="bold">Crick</text>

  <!-- Parental DNA - left of bubble -->
  <line x1="100" y1="135" x2="280" y2="135" stroke="#222" stroke-width="3"/>
  <line x1="100" y1="170" x2="280" y2="170" stroke="#222" stroke-width="3"/>

  <!-- Parental DNA - right of bubble -->
  <line x1="620" y1="135" x2="800" y2="135" stroke="#222" stroke-width="3"/>
  <line x1="620" y1="170" x2="800" y2="170" stroke="#222" stroke-width="3"/>

  <!-- Replication bubble - parental strands (black) oval -->
  <path d="M 280 135 Q 450 70, 620 135" stroke="#222" stroke-width="3" fill="none"/>
  <path d="M 280 170 Q 450 235, 620 170" stroke="#222" stroke-width="3" fill="none"/>

  <!-- TOP nascent strand (Watson) - follows inner arc of top bubble -->
  <!-- Left half = Leading = solid - path reversed so arrow points LEFT toward fork -->
  <path d="M 605 138 Q 450 85, 295 138" stroke="#1976d2" stroke-width="3" fill="none" marker-end="url(#arrowblue4)" clip-path="url(#leftHalf4)"/>
  <!-- Right half = Lagging = dashed -->
  <path d="M 295 138 Q 450 85, 605 138" stroke="#1976d2" stroke-width="3" fill="none" stroke-dasharray="8,4" clip-path="url(#rightHalf4)"/>

  <!-- BOTTOM nascent strand (Crick) - follows inner arc of bottom bubble -->
  <!-- Left half = Lagging = dashed -->
  <path d="M 295 167 Q 450 220, 605 167" stroke="#1976d2" stroke-width="3" fill="none" stroke-dasharray="8,4" clip-path="url(#leftHalf4)"/>
  <!-- Right half = Leading = solid - arrow points RIGHT toward fork -->
  <path d="M 295 167 Q 450 220, 605 167" stroke="#1976d2" stroke-width="3" fill="none" marker-end="url(#arrowblue4)" clip-path="url(#rightHalf4)"/>

  <!-- Origin marker with vertical dashed line -->
  <line x1="450" y1="70" x2="450" y2="245" stroke="#d32f2f" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="450" y="160" font-family="Arial, sans-serif" font-size="14" fill="#d32f2f" text-anchor="middle" font-weight="bold">Origin</text>

  <!-- Fork direction arrows -->
  <line x1="350" y1="152" x2="295" y2="152" stroke="#d32f2f" stroke-width="2" marker-end="url(#arrowred3)"/>
  <line x1="550" y1="152" x2="605" y2="152" stroke="#d32f2f" stroke-width="2" marker-end="url(#arrowred3)"/>

  <!-- Legend -->
  <line x1="100" y1="330" x2="150" y2="330" stroke="#222" stroke-width="3"/>
  <text x="160" y="335" font-family="Arial, sans-serif" font-size="14" fill="#333">Parental (template)</text>

  <line x1="350" y1="330" x2="400" y2="330" stroke="#1976d2" stroke-width="3"/>
  <text x="410" y="335" font-family="Arial, sans-serif" font-size="14" fill="#333">Leading (continuous)</text>

  <line x1="600" y1="330" x2="650" y2="330" stroke="#1976d2" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="660" y="335" font-family="Arial, sans-serif" font-size="14" fill="#333">Lagging (Okazaki)</text>

</svg>