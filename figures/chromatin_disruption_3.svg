<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Panel 3: The inheritance question - asymmetric vs symmetric -->

  <!-- Title -->
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="20" fill="#333" text-anchor="middle">How are parental histones distributed?</text>

  <!-- Option A: Asymmetric (left side) -->
  <text x="200" y="70" font-family="Arial, sans-serif" font-size="16" fill="#333" text-anchor="middle" font-weight="bold">Asymmetric</text>
  <text x="200" y="90" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">(Weintraub 1979 - SV40)</text>

  <!-- Upper strand - all parental -->
  <line x1="50" y1="140" x2="350" y2="140" stroke="#222" stroke-width="2"/>
  <g transform="translate(100, 140)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#7cb342" stroke-width="2"/>
    <circle cx="0" cy="0" r="12" fill="#64b5f6" stroke="#1976d2" stroke-width="2"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#1976d2" stroke-width="2"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#1976d2" stroke-width="2"/>
  </g>
  <g transform="translate(160, 140)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#7cb342" stroke-width="2"/>
    <circle cx="0" cy="0" r="12" fill="#64b5f6" stroke="#1976d2" stroke-width="2"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#1976d2" stroke-width="2"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#1976d2" stroke-width="2"/>
  </g>
  <g transform="translate(220, 140)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#7cb342" stroke-width="2"/>
    <circle cx="0" cy="0" r="12" fill="#64b5f6" stroke="#1976d2" stroke-width="2"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#1976d2" stroke-width="2"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#1976d2" stroke-width="2"/>
  </g>
  <g transform="translate(280, 140)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#7cb342" stroke-width="2"/>
    <circle cx="0" cy="0" r="12" fill="#64b5f6" stroke="#1976d2" stroke-width="2"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#1976d2" stroke-width="2"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#1976d2" stroke-width="2"/>
  </g>

  <!-- Lower strand - all nascent -->
  <line x1="50" y1="200" x2="350" y2="200" stroke="#222" stroke-width="2"/>
  <g transform="translate(100, 200)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#7cb342" stroke-width="2"/>
    <circle cx="0" cy="0" r="12" fill="#b3e5fc" stroke="#4fc3f7" stroke-width="2"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#4fc3f7" stroke-width="2"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#4fc3f7" stroke-width="2"/>
  </g>
  <g transform="translate(160, 200)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#7cb342" stroke-width="2"/>
    <circle cx="0" cy="0" r="12" fill="#b3e5fc" stroke="#4fc3f7" stroke-width="2"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#4fc3f7" stroke-width="2"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#4fc3f7" stroke-width="2"/>
  </g>
  <g transform="translate(220, 200)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#7cb342" stroke-width="2"/>
    <circle cx="0" cy="0" r="12" fill="#b3e5fc" stroke="#4fc3f7" stroke-width="2"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#4fc3f7" stroke-width="2"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#4fc3f7" stroke-width="2"/>
  </g>
  <g transform="translate(280, 200)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#7cb342" stroke-width="2"/>
    <circle cx="0" cy="0" r="12" fill="#b3e5fc" stroke="#4fc3f7" stroke-width="2"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#4fc3f7" stroke-width="2"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#4fc3f7" stroke-width="2"/>
  </g>

  <!-- Divider -->
  <line x1="400" y1="100" x2="400" y2="280" stroke="#ccc" stroke-width="1" stroke-dasharray="5,5"/>

  <!-- Option B: Symmetric/Mixed (right side) -->
  <text x="600" y="70" font-family="Arial, sans-serif" font-size="16" fill="#333" text-anchor="middle" font-weight="bold">Symmetric / Mixed</text>
  <text x="600" y="90" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">(enables epigenetic inheritance)</text>

  <!-- Upper strand - mixed -->
  <line x1="450" y1="140" x2="750" y2="140" stroke="#222" stroke-width="2"/>
  <g transform="translate(500, 140)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#7cb342" stroke-width="2"/>
    <circle cx="0" cy="0" r="12" fill="#64b5f6" stroke="#1976d2" stroke-width="2"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#1976d2" stroke-width="2"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#1976d2" stroke-width="2"/>
  </g>
  <g transform="translate(560, 140)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#7cb342" stroke-width="2"/>
    <circle cx="0" cy="0" r="12" fill="#b3e5fc" stroke="#4fc3f7" stroke-width="2"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#4fc3f7" stroke-width="2"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#4fc3f7" stroke-width="2"/>
  </g>
  <g transform="translate(620, 140)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#7cb342" stroke-width="2"/>
    <circle cx="0" cy="0" r="12" fill="#64b5f6" stroke="#1976d2" stroke-width="2"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#1976d2" stroke-width="2"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#1976d2" stroke-width="2"/>
  </g>
  <g transform="translate(680, 140)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#7cb342" stroke-width="2"/>
    <circle cx="0" cy="0" r="12" fill="#b3e5fc" stroke="#4fc3f7" stroke-width="2"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#4fc3f7" stroke-width="2"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#4fc3f7" stroke-width="2"/>
  </g>

  <!-- Lower strand - mixed -->
  <line x1="450" y1="200" x2="750" y2="200" stroke="#222" stroke-width="2"/>
  <g transform="translate(500, 200)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#7cb342" stroke-width="2"/>
    <circle cx="0" cy="0" r="12" fill="#b3e5fc" stroke="#4fc3f7" stroke-width="2"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#4fc3f7" stroke-width="2"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#4fc3f7" stroke-width="2"/>
  </g>
  <g transform="translate(560, 200)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#7cb342" stroke-width="2"/>
    <circle cx="0" cy="0" r="12" fill="#64b5f6" stroke="#1976d2" stroke-width="2"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#1976d2" stroke-width="2"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#1976d2" stroke-width="2"/>
  </g>
  <g transform="translate(620, 200)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#7cb342" stroke-width="2"/>
    <circle cx="0" cy="0" r="12" fill="#b3e5fc" stroke="#4fc3f7" stroke-width="2"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#4fc3f7" stroke-width="2"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#4fc3f7" stroke-width="2"/>
  </g>
  <g transform="translate(680, 200)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#7cb342" stroke-width="2"/>
    <circle cx="0" cy="0" r="12" fill="#64b5f6" stroke="#1976d2" stroke-width="2"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#1976d2" stroke-width="2"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#1976d2" stroke-width="2"/>
  </g>

  <!-- Legend -->
  <g transform="translate(200, 320)">
    <circle cx="0" cy="0" r="15" fill="none" stroke="#7cb342" stroke-width="2"/>
    <circle cx="0" cy="0" r="10" fill="#64b5f6" stroke="#1976d2" stroke-width="2"/>
    <line x1="-5" y1="-5" x2="5" y2="5" stroke="#1976d2" stroke-width="2"/>
    <line x1="5" y1="-5" x2="-5" y2="5" stroke="#1976d2" stroke-width="2"/>
    <text x="25" y="5" font-family="Arial, sans-serif" font-size="14" fill="#333">Parental H3/H4</text>
  </g>

  <g transform="translate(200, 360)">
    <circle cx="0" cy="0" r="15" fill="none" stroke="#7cb342" stroke-width="2"/>
    <circle cx="0" cy="0" r="10" fill="#b3e5fc" stroke="#4fc3f7" stroke-width="2"/>
    <line x1="-5" y1="-5" x2="5" y2="5" stroke="#4fc3f7" stroke-width="2"/>
    <line x1="5" y1="-5" x2="-5" y2="5" stroke="#4fc3f7" stroke-width="2"/>
    <text x="25" y="5" font-family="Arial, sans-serif" font-size="14" fill="#333">Nascent H3/H4</text>
  </g>

  <!-- Inheritance explanation -->
  <text x="600" y="320" font-family="Arial, sans-serif" font-size="13" fill="#333" text-anchor="middle">Parental histones carry modifications (e.g., H3K27me3)</text>
  <text x="600" y="340" font-family="Arial, sans-serif" font-size="13" fill="#333" text-anchor="middle">that can template modification of neighbors</text>
  <text x="600" y="370" font-family="Arial, sans-serif" font-size="13" fill="#666" text-anchor="middle" font-style="italic">"read-write" mechanism for epigenetic inheritance</text>
</svg>