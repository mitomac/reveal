<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Step 1: Two antiparallel strands labeled Watson and Crick -->

  <!-- Watson strand (top) - 5' to 3' left to right -->
  <line x1="100" y1="120" x2="800" y2="120" stroke="#222" stroke-width="3"/>
  <text x="60" y="125" font-family="Arial, sans-serif" font-size="16" fill="#333">5'</text>
  <text x="820" y="125" font-family="Arial, sans-serif" font-size="16" fill="#333">3'</text>
  <text x="450" y="100" font-family="Arial, sans-serif" font-size="18" fill="#333" text-anchor="middle" font-weight="bold">Watson</text>

  <!-- Crick strand (bottom) - 3' to 5' left to right (antiparallel) -->
  <line x1="100" y1="180" x2="800" y2="180" stroke="#222" stroke-width="3"/>
  <text x="60" y="185" font-family="Arial, sans-serif" font-size="16" fill="#333">3'</text>
  <text x="820" y="185" font-family="Arial, sans-serif" font-size="16" fill="#333">5'</text>
  <text x="450" y="215" font-family="Arial, sans-serif" font-size="18" fill="#333" text-anchor="middle" font-weight="bold">Crick</text>

  <!-- Arrow showing 5' to 3' direction for Watson -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <!-- Direction arrows below -->
  <line x1="300" y1="260" x2="400" y2="260" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="350" y="280" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">5' → 3'</text>

</svg>