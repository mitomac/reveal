<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="400" viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Step 5: After replication - two daughter duplexes, each with parental + nascent strand -->

  <defs>
    <marker id="arrowblue5" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>

  <!-- DAUGHTER DUPLEX 1 (top) -->

  <!-- Watson strand labels -->
  <text x="60" y="105" font-family="Arial, sans-serif" font-size="14" fill="#333">5'</text>
  <text x="820" y="105" font-family="Arial, sans-serif" font-size="14" fill="#333">3'</text>

  <!-- Parental Watson (black) - top strand of daughter 1 -->
  <line x1="100" y1="100" x2="800" y2="100" stroke="#222" stroke-width="3"/>
  <text x="850" y="105" font-family="Arial, sans-serif" font-size="12" fill="#222">Parental</text>

  <!-- Nascent Crick (blue) - bottom strand of daughter 1 -->
  <!-- Left half was leading (solid, arrow LEFT away from origin, 5'->3'), right half was lagging (dashed) -->
  <line x1="450" y1="130" x2="100" y2="130" stroke="#1976d2" stroke-width="3" marker-end="url(#arrowblue5)"/>
  <line x1="450" y1="130" x2="800" y2="130" stroke="#1976d2" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="850" y="135" font-family="Arial, sans-serif" font-size="12" fill="#1976d2">Nascent</text>

  <!-- Crick strand labels -->
  <text x="60" y="135" font-family="Arial, sans-serif" font-size="14" fill="#333">3'</text>
  <text x="820" y="135" font-family="Arial, sans-serif" font-size="14" fill="#333">5'</text>

  <!-- Leading/Lagging labels for Daughter 1 -->
  <text x="250" y="165" font-family="Arial, sans-serif" font-size="14" fill="#1976d2" text-anchor="middle" font-weight="bold">Leading</text>
  <text x="650" y="165" font-family="Arial, sans-serif" font-size="14" fill="#1976d2" text-anchor="middle" font-weight="bold">Lagging</text>


  <!-- DAUGHTER DUPLEX 2 (bottom) -->

  <!-- Nascent Watson (blue) - top strand of daughter 2 -->
  <!-- Left half was lagging (dashed), right half was leading (solid, arrow RIGHT away from origin, 5'->3') -->
  <text x="60" y="245" font-family="Arial, sans-serif" font-size="14" fill="#333">5'</text>
  <text x="820" y="245" font-family="Arial, sans-serif" font-size="14" fill="#333">3'</text>

  <line x1="100" y1="240" x2="450" y2="240" stroke="#1976d2" stroke-width="3" stroke-dasharray="8,4"/>
  <line x1="450" y1="240" x2="800" y2="240" stroke="#1976d2" stroke-width="3" marker-end="url(#arrowblue5)"/>
  <text x="850" y="245" font-family="Arial, sans-serif" font-size="12" fill="#1976d2">Nascent</text>

  <!-- Parental Crick (black) - bottom strand of daughter 2 -->
  <line x1="100" y1="270" x2="800" y2="270" stroke="#222" stroke-width="3"/>
  <text x="850" y="275" font-family="Arial, sans-serif" font-size="12" fill="#222">Parental</text>

  <!-- Crick strand labels -->
  <text x="60" y="275" font-family="Arial, sans-serif" font-size="14" fill="#333">3'</text>
  <text x="820" y="275" font-family="Arial, sans-serif" font-size="14" fill="#333">5'</text>

  <!-- Leading/Lagging labels for Daughter 2 -->
  <text x="250" y="220" font-family="Arial, sans-serif" font-size="14" fill="#1976d2" text-anchor="middle" font-weight="bold">Lagging</text>
  <text x="650" y="220" font-family="Arial, sans-serif" font-size="14" fill="#1976d2" text-anchor="middle" font-weight="bold">Leading</text>

  <!-- Origin marker (dashed vertical line showing where origin was) -->
  <line x1="450" y1="85" x2="450" y2="290" stroke="#d32f2f" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="450" y="310" font-family="Arial, sans-serif" font-size="12" fill="#d32f2f" text-anchor="middle">Origin</text>

  <!-- Legend -->
  <line x1="150" y1="355" x2="200" y2="355" stroke="#222" stroke-width="3"/>
  <text x="210" y="360" font-family="Arial, sans-serif" font-size="13" fill="#333">Parental (template)</text>

  <line x1="400" y1="355" x2="450" y2="355" stroke="#1976d2" stroke-width="3"/>
  <text x="460" y="360" font-family="Arial, sans-serif" font-size="13" fill="#333">Leading</text>

  <line x1="570" y1="355" x2="620" y2="355" stroke="#1976d2" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="630" y="360" font-family="Arial, sans-serif" font-size="13" fill="#333">Lagging</text>

</svg>